apiVersion: v2
name: superbase-gateway
description: Super Base Orchestration System - Gateway Helm Chart
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: qdrant
    version: "0.6.x"
    repository: "https://qdrant.github.io/qdrant-helm"
    condition: qdrant.enabled
